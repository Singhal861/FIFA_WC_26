version: 2

sources:
  - name: bronze
    database: singhal
    schema: fifa_worldcup_bronze
    description: >
      Bronze layer tables containing raw World Cup 2026 data.
      Ingested and maintained upstream by Python notebooks.
    
    tables:
      - name: players
        description: Raw player roster data with cumulative stats
        
      - name: teams
        description: Raw team information and group assignments
        
      - name: matches
        description: Raw match results with scores and goal events
        
      - name: goal_events
        description: |
          Individual goal events extracted from matches with preserved timestamps.
          Includes player name, goal time (with injury time like '90+3'), team info, and match context.
          Replaces manual parsing of home_scorers/away_scorers strings from matches table.
        
      - name: group_standings
        description: Raw group stage standings with points and rankings
        
      - name: knockout_bracket
        description: Raw knockout tournament bracket structure
        
      - name: stadiums
        description: Raw venue and stadium information

  - name: silver
    database: singhal
    schema: fifa_worldcup_silver
    description: >
      Silver layer tables containing cleaned and transformed World Cup 2026 data.
      Some tables are managed by dbt, others are reference tables created manually.
    
    tables:
      # Reference tables (manually created, not managed by dbt)
      - name: ref_stadium_enriched
        description: |
          Static reference table for stadium timezone and country mapping.
          Created manually in notebook (one-time table, not managed by dbt).
          Used for UTC conversion in gold layer.
      
      # Core silver tables (managed by dbt silver models)
      - name: silver_matches
        description: |
          Cleaned and enriched match data with scores, status, winner calculations.
          Includes knockout bracket structure and timezone conversions.
      
      - name: silver_goal_events
        description: |
          Individual goal events with scorer names, minutes, penalties.
          Cleaned and deduplicated from bronze goal_events.
      
      - name: silver_teams
        description: |
          Team information with logos, group assignments, and metadata.
          Enriched from bronze teams table.
      
      - name: silver_players
        description: |
          Player roster with team associations and metadata.
          Cleaned from bronze players table.
      
      - name: silver_stadiums
        description: |
          Stadium information including names and locations.
          Cleaned from bronze stadiums table.
      
      - name: silver_group_standings
        description: |
          Group stage standings with points, wins, losses, draws.
          Transformed from bronze group_standings.
      
      - name: silver_player_stats_history
        description: |
          Historical snapshots of player statistics (goals, assists, rating).
          SCD Type 2 table with valid_from timestamps and is_current flag.
          Used for time-series analysis and golden boot race tracking.
