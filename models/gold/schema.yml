version: 2

models:
  - name: gold_fact_match_schedule
    description: >
      Unified match fact table (Requirements #1, #3, #4).
      Replaces gold_tournament_bracket + gold_match_schedule.
      Contains ALL matches (group stage + knockout) with bracket structure, 
      match schedule, and top scorers. Single source of truth for match data.
    columns:
      - name: match_id
        description: Unique match identifier
      - name: match_status
        description: Live, Upcoming, or Finished
      - name: stage
        description: Tournament stage (Group Stage, Quarter Final, Semi Final, Final, etc.)
      - name: bracket_position
        description: Bracket position for knockout matches (e.g., QF1, SF1, FIN). NULL for group stage.
      - name: feeds_into_position
        description: Next bracket position this match feeds into. NULL for Final and group stage.
      - name: bracket_half
        description: Visual positioning (Top/Bottom). NULL for group stage.
      - name: home_display_name
        description: Display name with TBD logic (e.g., "Winner of QF1", "TBD", or actual team name)
      - name: away_display_name
        description: Display name with TBD logic (e.g., "Winner of QF3", "TBD", or actual team name)
      - name: is_knockout
        description: TRUE for knockout matches, FALSE for group stage
      - name: group_name
        description: Group name (A, B, C, etc.) for group stage. NULL for knockout.
      - name: home_team_logo
        description: Home team flag/logo
      - name: away_team_logo
        description: Away team flag/logo
      - name: home_top_scorer_name
        description: Top scorer in THIS match for home team
      - name: home_top_scorer_goals
        description: Goals scored by home top scorer in THIS match
      - name: away_top_scorer_name
        description: Top scorer in THIS match for away team
      - name: away_top_scorer_goals
        description: Goals scored by away top scorer in THIS match
      - name: winner_team_name
        description: Match winner team name (NULL if not finished)
      - name: winner_team_logo
        description: Winner team flag/logo
      - name: match_datetime_utc
        description: Match time in UTC
      - name: match_date_local
        description: Match time in local timezone
      - name: stadium_name
        description: Venue name
      - name: stadium_city
        description: City location
      - name: actual_country
        description: Host country
      - name: hours_until_kickoff
        description: Hours until match starts (for upcoming matches)
      - name: minutes_elapsed
        description: Minutes since kickoff (for live matches)
      - name: is_finished
        description: TRUE if match is complete
      - name: is_live
        description: TRUE if match is currently in progress

  - name: gold_player_leaderboard
    description: >
      Top 10 scorers for dashboard (Requirement #2).
      Includes goals, assists, rating, minutes, matches, highest goals vs team.
      Uses player_stats_history (current snapshot) and goal_events.
    columns:
      - name: player_id
        description: Unique player identifier
      - name: player_name
        description: Player full name
      - name: goals_scored
        description: Total tournament goals
      - name: assists
        description: Total tournament assists
      - name: rating
        description: Player rating out of 10
      - name: highest_goals_vs_team
        description: Team against which player scored most goals

  - name: gold_golden_boot_race
    description: >
      Match-by-match goal progression for top 3 scorers (Requirement #6).
      Timeline data for line graph visualization.
      Handles ties via DENSE_RANK (1,1,2 or 1,2,2 or 1,2,3,3).
    columns:
      - name: player_name
        description: Player name
      - name: match_sequence
        description: Match number in tournament chronology
      - name: goals_cumulative
        description: Total goals up to this match
      - name: rank_at_match
        description: Rank position at this match (1-3, with ties)

  - name: gold_fact_team_performance
    description: >
      Unified team performance fact table (Requirements #5 + Team Drill-Down).
      Replaces gold_points_table + gold_team_summary.
      Single source of truth combining group standings, tournament stats, and team metadata.
      Includes both group-specific metrics (for standings) and tournament-wide metrics (for drill-down).
    columns:
      - name: team_name
        description: Team name (primary key)
      - name: team_logo
        description: Team flag/emblem URL
      - name: group_name
        description: Group assignment (A, B, C, etc.)
      - name: rank_in_group
        description: Position within group (1-4)
      - name: qualification_status
        description: Qualified, Disqualified, or In Progress
      - name: group_matches_played
        description: Number of group stage matches completed
      - name: group_wins
        description: Wins in group stage only
      - name: group_draws
        description: Draws in group stage only
      - name: group_losses
        description: Losses in group stage only
      - name: group_goals_for
        description: Goals scored in group stage
      - name: group_goals_against
        description: Goals conceded in group stage
      - name: group_goal_difference
        description: Goal difference in group stage (GF - GA)
      - name: total_points
        description: Total points (3 per win, 1 per draw) - group stage only
      - name: total_matches
        description: All tournament matches (group + knockout)
      - name: total_wins
        description: Total wins across all tournament stages
      - name: total_draws
        description: Total draws across all tournament stages
      - name: total_losses
        description: Total losses across all tournament stages
      - name: total_goals_for
        description: Total goals scored in tournament
      - name: total_goals_against
        description: Total goals conceded in tournament
      - name: total_goal_difference
        description: Overall goal difference (GF - GA)
      - name: clean_sheets
        description: Matches with zero goals conceded
      - name: avg_goals_per_match
        description: Average goals scored per match
      - name: win_percentage
        description: Win rate as percentage (wins / matches)
      - name: stage
        description: Current/latest tournament stage reached
      - name: top_scorer_name
        description: Team's top goal scorer name
      - name: top_scorer_goals
        description: Goals scored by team's top scorer
      - name: top_assist_provider
        description: Team's top assist provider name
      - name: top_assist_count
        description: Assists by team's top assist provider

  - name: gold_team_goals
    description: >
      Match-by-match goal details per team.
      Exposes individual goals without name aggregation.
    columns:
      - name: team_name
        description: Team name
      - name: match_id
        description: Match identifier
      - name: scorer_name
        description: Player who scored
      - name: minute
        description: Goal minute
      - name: is_penalty
        description: Whether goal was from penalty

  - name: gold_tournament_summary
    description: >
      Tournament-wide aggregate statistics.
      Total goals, matches, average goals per match, etc.
