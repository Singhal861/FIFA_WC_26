version: 2

models:
  - name: silver_matches
    description: >
      All 104 World Cup 2026 matches in one table — group stage unioned
      with knockout stage. Single source of truth for match facts.
      
      Group stage: winner calculated from scores (draws possible).
      Knockout stage: winner from API (includes penalty shootout results).
    
    columns:
      - name: match_id
        description: Unique match identifier
        tests:
          - unique
          - not_null
          
      - name: stage
        description: Tournament stage (Group Stage, Round of 16, Quarter Final, etc.)
        tests:
          - accepted_values:
              arguments:
                values: ['Group Stage', 'Round of 32', 'Round of 16', 'Quarter Final', 
                       'Semi Final', 'Third Place', 'Final']
              
      - name: is_finished
        description: Whether the match has been completed
        tests:
          - not_null

  - name: silver_knockout_bracket
    description: >
      Bracket structure only. Use this for the tournament tree visualization.
      Join to silver_matches on match_id to get scores and team names.
      
      feeds_into_position: Shows where the winner advances (the key field for drawing bracket trees).
    
    columns:
      - name: match_id
        description: Match identifier (links to silver_matches)
        tests:
          - unique
          - not_null
          
      - name: round
        description: Round code (R32,R16, QF, SF, Final, 3rd)
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['R32', 'R16', 'QF', 'SF', 'Final', '3rd']
              
      - name: feeds_into_position
        description: Bracket position where winner advances (NULL for final/third place)

  - name: silver_goal_events
    description: >
      Normalized goal events - one row per goal scored.
      Parsed from home_scorers/away_scorers JSON arrays in bronze.matches.
      
      Enables match timelines, goal pattern analysis, and event-level insights.
      Matches with no goals simply have zero rows here.
      
      Note: scorer_name is parsed from strings like "Lionel Messi 23' (p)".
      No player_id available - use silver_players.goals_scored for accurate 
      top scorer leaderboards with IDs.
    
    columns:
      - name: goal_event_id
        description: Unique identifier for each goal event (MD5 hash)
        tests:
          - unique
          - not_null
          
      - name: match_id
        description: Match where goal was scored (links to silver_matches)
        tests:
          - not_null
          - relationships:
              to: ref('silver_matches')
              field: match_id
              
      - name: scorer_name
        description: Player who scored (parsed from scorer string, no player_id)
        tests:
          - not_null
          
      - name: minute
        description: Match minute when goal was scored (1-90+)
        tests:
          - not_null
          
      - name: is_penalty
        description: Whether goal was scored from a penalty kick
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
              
      - name: is_home_goal
        description: Whether goal was scored by the home team
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]